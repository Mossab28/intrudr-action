name: Release
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  major-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move major version tag
        run: |
          MAJOR="v$(echo '${{ github.event.release.tag_name }}' | sed -E 's/^v?([0-9]+).*/\1/')"
          git tag -f "$MAJOR"
          git push origin -f "$MAJOR"
